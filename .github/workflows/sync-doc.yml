name: Sync Google Doc

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch & parse Google Doc
        run: node scripts/fetch-doc.js

      - name: Commit data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json — skipping commit"
          else
            git commit -m "chore: sync trip data from Google Doc [skip ci]"
            git push
          fi
